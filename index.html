<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bible Quiz Platform</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<base target="_blank">
</head>
<body>

  <main class="app">

    <!-- Landing Screen -->
    <section id="landing-screen" class="screen center">
      <div class="card landing-card">
        <div class="logo">📖</div>
        <h1>Bible Quiz Platform</h1>
        <p class="subtitle">100 Questions • 20 Minutes</p>

        <div class="input-group">
          <input type="text" id="username" placeholder="Enter your full name" autocomplete="off" minlength="3">
        </div>

        <button id="start-btn" class="primary-btn">Start Exam</button>
        <p class="footer">TechGuru Systems</p>
      </div>
    </section>

    <!-- Quiz Screen -->
    <section id="quiz-screen" class="screen hidden">
      <div class="quiz-wrapper">
        <div class="top-bar">
          <div class="progress">Question <span id="current-num">1</span> / 100</div>
          <div id="timer" class="timer">20:00</div>
          <div id="display-name" class="username-display"></div>
        </div>

        <div class="card question-card">
          <div class="question-number">Question <span id="q-num">1</span></div>
          <h2 id="question-text">Loading question...</h2>
          <div id="options" class="options"></div>
          <div id="feedback-area" class="feedback-area hidden">
            <div class="feedback-emoji" id="feedback-emoji"></div>
            <div class="feedback-message" id="feedback-message"></div>
          </div>
        </div>

        <div class="nav-controls">
          <button id="prev-btn" class="secondary-btn">Previous</button>
          <button id="next-btn" class="primary-btn">Next</button>
          <button id="submit-btn" class="danger-btn">Submit Exam</button>
        </div>
      </div>
    </section>

    <!-- Result Screen -->
    <section id="result-screen" class="screen center hidden">
      <div class="card result-card">
        <div class="result-header">
          <div class="result-icon">🎓</div>
          <h2>Result Summary</h2>
          <p id="candidate-name"></p>
        </div>

        <div class="score-box">
          <h1 id="score-display">0%</h1>
          <p id="detailed-score">0 / 100</p>
          <div class="score-badge" id="score-badge">Pass</div>
        </div>

        <div class="chart-area">
          <canvas id="resultChart"></canvas>
        </div>

        <div id="study-tip" class="study-tip"></div>

        <button onclick="location.reload()" class="primary-btn">Take Again</button>
      </div>
    </section>

    <!-- Submit Modal -->
    <div id="confirm-modal" class="modal hidden">
      <div class="modal-content">
        <div class="modal-icon">⚠️</div>
        <h3>Submit Exam?</h3>
        <p>You have answered <span id="answered-count">0</span> out of 100 questions.</p>
        <div class="modal-actions">
          <button id="cancel-submit" class="secondary-btn">Cancel</button>
          <button id="confirm-submit" class="primary-btn">Yes, Submit</button>
        </div>
      </div>
    </div>

  </main>
